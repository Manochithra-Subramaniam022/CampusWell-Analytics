services:
  # Production Web Service
  - type: web
    name: campuswell-analytics
    env: docker
    plan: free
    image:
      url: docker.io/manochithra022/campuswell-analytics:latest
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

# Service configuration for Render deployment
# This file tells Render how to build and run your Docker container
